<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>LLM Robot Control</title>
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --border: #2a2f3a; --text: #e6e6e6;
    --muted: #8a8f9a; --accent: #5aa8ff; --user: #2b3a55; --assistant: #1f2530;
    --danger: #d9534f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; }
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 780px; margin: 0 auto; padding: 12px; }
  header { display: flex; align-items: center; gap: 10px; padding: 6px 4px 12px; border-bottom: 1px solid var(--border); }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; flex: 1; }
  .odom { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  button.icon { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 12px; cursor: pointer; }
  button.icon:hover { border-color: var(--accent); }
  button.estop { background: var(--danger); border-color: var(--danger); color: white; font-weight: 600; }
  #log { flex: 1; overflow-y: auto; padding: 12px 4px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 10px 12px; border-radius: 10px; max-width: 85%; line-height: 1.45; font-size: 14px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { background: var(--user); align-self: flex-end; }
  .msg.assistant { background: var(--assistant); align-self: flex-start; border: 1px solid var(--border); }
  .msg.system { background: transparent; color: var(--muted); font-size: 12px; text-align: center; align-self: center; }
  #composer { display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid var(--border); }
  #input { flex: 1; resize: none; min-height: 44px; max-height: 140px; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; }
  #input:focus { outline: none; border-color: var(--accent); }
  #send { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 0 18px;
    font-size: 14px; font-weight: 600; cursor: pointer; }
  #send:disabled { opacity: 0.5; cursor: wait; }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 6px;
    animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>LLM Robot Control</h1>
    <span id="odom" class="odom">x=0.000  y=0.000  theta=0</span>
    <button class="icon" id="reset-btn">reset</button>
    <button class="icon estop" id="estop-btn">STOP</button>
  </header>
  <div id="log"></div>
  <div id="composer">
    <textarea id="input" placeholder="instruct the robot... (Enter to send, Shift+Enter newline)" autofocus></textarea>
    <button id="send">send</button>
  </div>
</div>
<script>
const log = document.getElementById('log');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const estopBtn = document.getElementById('estop-btn');
const resetBtn = document.getElementById('reset-btn');
const odomEl = document.getElementById('odom');

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}
function setOdom(o) {
  if (!o) return;
  odomEl.textContent = `x=${o.x.toFixed(3)}  y=${o.y.toFixed(3)}  theta=${o.theta_deg.toFixed(1)}`;
}
async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('user', text);
  sendBtn.disabled = true;
  const pending = addMsg('assistant', '');
  pending.innerHTML = '<span class="dot"></span>thinking...';
  try {
    const r = await fetch('/chat', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    const data = await r.json();
    pending.textContent = data.reply || '(no reply)';
    setOdom(data.odom);
  } catch (e) {
    pending.textContent = 'request failed: ' + e.message;
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}
sendBtn.onclick = send;
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
estopBtn.onclick = async () => {
  await fetch('/estop', {method: 'POST'});
  addMsg('system', 'emergency stop sent');
};
resetBtn.onclick = async () => {
  await fetch('/reset', {method: 'POST'});
  log.innerHTML = '';
  addMsg('system', 'conversation reset');
};
addMsg('system', 'Ready. Try: "forward 2 seconds" / "turn left 90 degrees" / "spin in place then stop"');
</script>
</body>
</html>
